    <!-- JSON.stringify Safe Guard for React 19 and Third-Party Tracking Pixels -->
    <script>
      (function() {
        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          const seen = new Set();
          
          function customReplacer(key, val) {
            // Filter out React 19 internal properties on DOM elements that contain circular references
            if (key && (key.startsWith('__reactFiber') || key.startsWith('__reactProps') || key.startsWith('__reactEvents') || key.startsWith('__reactContainer'))) {
              return undefined;
            }
            // Protect against serializing native DOM elements which are inherently circular
            if (val instanceof HTMLElement || (val && typeof val === 'object' && typeof val.nodeType === 'number')) {
              return '[HTMLElement: ' + (val.tagName || 'ELEMENT') + ']';
            }
            // Safely handle circular reference objects
            if (val && typeof val === 'object') {
              if (seen.has(val)) {
                return '[Circular]';
              }
              seen.add(val);
            }
            // Execute the original replacer if provided
            if (typeof replacer === 'function') {
              return replacer(key, val);
            }
            return val;
          }
          
          try {
            return originalStringify(value, customReplacer, space);
          } catch (e) {
            return '"[Serialization Error]"';
          }
        };
      })();
    </script>
